        [head=2]Служебное уведомление оперативному составу[/head]

        [head=3]Interdyne Pharmaceutics — Отряд «Redwings»[/head]


        [italic]Гриф: Для служебного пользования[/italic]


        Коллеги, напоминаю основные правила работы отряда во время дежурства. Просьба внимательно ознакомиться и соблюдать - это напрямую влияет на работу всей команды и компании в целом.

        По прибытию в сектор позаботьтесь об имплантировании клиентов, указанных в реестре страховых контрактов. Без установленного импланта вы не будете получать сигнал о критическом состоянии клиента, что напрямую влияет на скорость реагирования и выполнение контракта.

        Все клиенты, указанные в реестре страховых контрактов,  обязательно должны их иметь. Если имплант отсутствует - в случае потери клиента это ваша зона ответственности.


        Работа ведётся строго с клиентами Interdyne. Спасение, реанимация и экстренная медицинская помощь лицам без действующей страховки запрещена. При этом вы можете оказывать иные услуги - продажа медикаментов, консультации, осмотры - если это не мешает выполнению контрактов.

        Помните, что наши клиенты - это наши клиенты. Любое вмешательство в процесс лечения или эвакуации со стороны третьих лиц рассматривается как препятствие нашей работе. Действуйте по ситуации: Сначала используйте несиловые методы, но при наличии угрозы вам или клиенту допускается эскалация вплоть до летальных мер.


        При работе в зонах других корпораций избегайте лишних конфликтов. Нам не нужны дополнительные разбирательства и расходы на юристов - работайте аккуратно.

        Также напоминаем во время дежурства шаттл и всё имущество на нём закреплено за вами. Без веской причины его не покидаем. В случае утраты имущества ответственность ложится на отряд.


