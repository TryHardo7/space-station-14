- type: entity
  parent: BaseBullet
  id: BulletLightRifle
  categories: [ HideSpawnMenu ]
  name: bullet (.30 rifle)
  components:
  # SS220-add-projectile-wounds-begin
  - type: PathologyOnProjectileHit
    weightedRandomProviderEntity: HeavyCaliberFragment
  # SS220-add-projectile-wounds-begin
  - type: Projectile
    damage:
      types:
        Piercing: 33 #ss220lowTTKUpdate

- type: entity
  parent: BaseBulletPractice
  id: BulletLightRiflePractice
  categories: [ HideSpawnMenu ]
  name: bullet (.30 rifle practice)
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 2

- type: entity
  parent: BaseBulletIncendiary
  id: BulletLightRifleIncendiary
  categories: [ HideSpawnMenu ]
  name: bullet (.30 rifle incendiary)
  components:
  # SS220-add-projectile-wounds-begin
  - type: PathologyOnProjectileHit
    weightedRandomProviderEntity: HeavyCaliberFragment
    chanceToApply: 0.2
  # SS220-add-projectile-wounds-end
  - type: Projectile
    damage:
      types:
        Piercing: 16 #weaponBalance #Incendary rebalance
        Heat: 3 #weaponBalance

- type: entity
  parent: BaseBulletUranium
  id: BulletLightRifleUranium
  categories: [ HideSpawnMenu ]
  name: bullet (.30 rifle uranium)
  components:
  # SS220-add-projectile-wounds-begin
  - type: PathologyOnProjectileHit
    weightedRandomProviderEntity: HeavyCaliberFragment
    chanceToApply: 0.2
  # SS220-add-projectile-wounds-end
  - type: Projectile
    damage:
      types:
        Radiation: 9
        Piercing: 14 #ss220lowTTKUpdate
