- type: entity
  parent: BaseBullet
  id: BulletMagnum
  categories: [ HideSpawnMenu ]
  name: bullet (.45 magnum)
  components:
  # SS220-add-projectile-wounds-begin
  - type: PathologyOnProjectileHit
    chanceToApply: 0.6
    weightedRandomProviderEntity: 45ACPCaliberFragment
  # SS220-add-projectile-wounds-end
  - type: Projectile
    damage:
      types:
        Piercing: 40 #ss220lowTTKUpdate

- type: entity
