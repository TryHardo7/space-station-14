- type: entity
  parent: BaseBullet
  id: BulletRifle
  categories: [ HideSpawnMenu ]
  name: bullet (.20 rifle)
  components:
  # SS220-add-projectile-wounds-begin
  - type: PathologyOnProjectileHit
    weightedRandomProviderEntity: LightCaliberFragment
  # SS220-add-projectile-wounds-end
  - type: Projectile
    damage:
      types:
        Piercing: 24 #ss220lowTTKUpdate

- type: entity
  parent: BaseBulletPractice
  id: BulletRiflePractice
  categories: [ HideSpawnMenu ]
  name: bullet (.20 rifle practice)
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 2

- type: entity
  parent: BaseBulletIncendiary
  id: BulletRifleIncendiary
  categories: [ HideSpawnMenu ]
  name: bullet (.20 rifle incendiary)
  components:
  # SS220-add-projectile-wounds-begin
  - type: PathologyOnProjectileHit
    chanceToApply: 0.1
    weightedRandomProviderEntity: LightCaliberFragment
  # SS220-add-projectile-wounds-end
  - type: Projectile
    damage:
      types:
        Piercing: 15 #weaponBalance #Incendary rebalance
        Heat: 5 #weaponBalance #ss220lowTTKUpdate

- type: entity
  parent: BaseBulletUranium
  id: BulletRifleUranium
  categories: [ HideSpawnMenu ]
  name: bullet (.20 rifle uranium)
  components:
  # SS220-add-projectile-wounds-begin
  - type: PathologyOnProjectileHit
    chanceToApply: 0.1
    weightedRandomProviderEntity: LightCaliberFragment
  # SS220-add-projectile-wounds-end
  - type: Projectile
    damage:
      types:
        Radiation: 7
        Piercing: 12 #ss220lowTTKUpdate

