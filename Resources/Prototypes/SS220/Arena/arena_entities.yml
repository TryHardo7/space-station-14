- type: entity
  parent: BaseUplinkRadio40TC
  id: ArenaUplinkRadio40TC
  suffix: Arena, 40 TC
  components:
  - type: Store
    categories:
    - UplinkWeaponry
    - UplinkAmmo
    - UplinkExplosives
    - UplinkChemicals
    - UplinkDeception
    - UplinkDisruption
    - UplinkWearables
    - UplinkPointless
    balance:
      Telecrystal: 40
    useDiscounts: true

- type: experienceDefinition
  id: ArenaFighterRoleExperience
  skills:
    CombatTraining:
      level: 4
    Construction:
      level: 4
    ExtravehicularActivity:
      level: 4
    Medicine:
      level: 4
    PhysicalTraining:
      level: 4

- type: entity
  parent: MindRoleGhostRoleNeutral
  id: MindRoleArenaFighter
  name: Arena Fighter
  components:
  - type: GhostRoleMarkerRole
    showInSummary: false

- type: ghostRoleRaffleSettings
  id: ArenaShort
  settings:
    initialDuration: 7
    joinExtendsDurationBy: 5
    maxDuration: 15

- type: randomHumanoidSettings
  id: ArenaFighterPlayerOne
  speciesBlacklist: [Vox]
  components:
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: RoleExperienceAdd
    definitionId: ArenaFighterRoleExperience
  - type: ArenaParticipant
    team: a
    icon: ArenaTeamAIcon
  - type: AntagImmune
  - type: ParadoxCloneBlacklist

- type: randomHumanoidSettings
  id: ArenaFighterPlayerTwo
  speciesBlacklist: [Vox]
  components:
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: RoleExperienceAdd
    definitionId: ArenaFighterRoleExperience
  - type: ArenaParticipant
    team: b
    icon: ArenaTeamBIcon
  - type: AntagImmune
  - type: ParadoxCloneBlacklist

- type: entity
  id: ArenaGhostSpawnerPlayerOne
  name: arena ghost role spawner (player one)
  parent: MarkerBase
  components:
  - type: RandomHumanoidSpawner
    settings: ArenaFighterPlayerOne
  - type: Sprite
    sprite: Markers/jobs.rsi
    state: ertsecurity

- type: entity
  id: ArenaGhostSpawnerPlayerTwo
