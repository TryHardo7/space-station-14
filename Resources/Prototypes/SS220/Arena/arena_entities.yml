  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMicroreactor

- type: entity
  id: ArenaFightBarrierDoor
  name: arena barrier
  suffix: Arena Barrier
  components:
  - type: ArenaFightBarrier
  - type: Tag
    tags:
    - Wall
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - SpecialWallLayer
        layer:
        - SpecialWallLayer
  - type: Airtight
  - type: Sprite
    sprite: Structures/Magic/forcewall.rsi
    state: forcewall
  - type: Icon
    sprite: Structures/Magic/forcewall.rsi
    state: forcewall
