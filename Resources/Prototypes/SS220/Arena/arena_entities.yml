  parent: MarkerBase
  components:
  - type: RandomHumanoidSpawner
    settings: ArenaFighterPlayerTwo
  - type: Sprite
    sprite: Markers/jobs.rsi
    state: ertleader

- type: entity
  parent: ClothingShoesBootsSpeed
  id: ClothingShoesBootsSpeedArenaMicroreactor
