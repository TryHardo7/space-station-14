- type: entity
  id: BaseArenaLobbyRule
  abstract: true
  parent: BaseGameRule
  components:
  - type: ArenaRule
    lifecycle: DeleteOnKill
    selectionMode: Rotation
    waitingTimeout: 60
    showInLobby: true

- type: entity
  id: ArenaLobbyOperative
  parent: BaseArenaLobbyRule
  components:
  - type: ArenaRule
    displayName: Operative 2x2 (uplink)
    description: Аплинк 40 ТК.
    maxPlayers: 4
    maps:
    - path: /Maps/SS220/Arenas/uplink_arena_2v2.yml
      loadout: ArenaLoadoutOperative

