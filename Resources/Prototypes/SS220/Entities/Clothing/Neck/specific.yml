- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckProtectBundle
  name: security protection bundle
  description: A protection bundle consisting of a pair of knee and elbow pads. Fits perfectly into your riot control workflow!
  components:
    - type: Sprite
      sprite: SS220/Clothing/Neck/Misc/tactical.rsi
    - type: Clothing
      sprite: SS220/Clothing/Neck/Misc/tactical.rsi
    - type: Armor # perfect
      modifiers:
        coefficients:
          Blunt: 0.90
          Slash: 0.90

