#Base
- type: entity
  id: BaseSpiderEgg
  abstract: true
  name: the-egg-of-the-spider-guard
  description: Is it a gemstone? Is it an egg? It looks expensive.
  components:
  - type: Icon
    sprite: Objects/Misc/eggspider.rsi
    state: icon
  - type: Sprite
    sprite: Objects/Misc/eggspider.rsi
    state: icon
  - type: Transform
    noRot: true
  - type: Clickable
  - type: InteractionOutline
  - type: PointLight
    radius: 1.5
    energy: 3
    color: "#4faffb"
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.1
        Heat: 0.1
  - type: Damageable
    damageContainer: Biological
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: desecration
      - !type:SpawnEntitiesBehavior
        spawn:
          EggshellsSpider:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SpiderEgg
  - type: StaticPrice
    price: 500
  - type: Examiner

#Spiders
- type: entity
  parent: [ BaseSpiderEgg ]
  id: SpiderEggDrone
  categories: [ HideSpawnMenu ]
  name: spider hive egg
  description: Is this a gem? Is this an egg? It looks expensive.
  components:
  - type: SpiderEgg
    incubationTime: 55
    spawnProtos:
      - id: MobSpiderDrone
        amount: 1
  - type: GhostRole #Ghost role
    makeSentient: true
    allowSpeech: false
    allowMovement: false
    name: spider-royDrone-name
    description: spider-royDrone-desc
    job: SpiderQueenServant
    raffle:
      settings: short
  - type: GhostTakeoverAvailable #Ghost role

