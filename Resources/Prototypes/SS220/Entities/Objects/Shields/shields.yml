- type: entity
  name: energy shield
  parent: [BaseItem]
  id: EnergyShieldAlt
  description: A piece of advanced tech made based on the technology used in the field shields. It is lightweight and can very effectively block any types of attacks.
  components:
    - type: ExaminableDamage
      messages: EnergyShieldMessages
    - type: ArmorBlock
    - type: ItemToggle
      soundActivate:
        path: /Audio/Weapons/ebladeon.ogg
      soundDeactivate:
        path: /Audio/Weapons/ebladeoff.ogg
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/Weapons/ebladehum.ogg
    - type: ItemToggleSize
      activatedSize: Huge
    - type: ComponentToggler
      components:
      - type: DisarmMalus
        malus: 0.6
    - type: Sprite
      sprite: Objects/Weapons/Melee/e_shield.rsi
      layers:
        - state: eshield-icon
        - state: eshield-on
          color: "#FFFFFF"
          visible: false
          shader: unshaded
          map: [ "shield" ]
    - type: Item
      size: Small
      sprite: Objects/Weapons/Melee/e_shield.rsi
      heldPrefix: eshield
    - type: UseDelay
      delay: 0.5
    - type: ToggleableVisuals
      spriteLayer: shield
      inhandVisuals:
        left:
          - state: inhand-left-shield
            shader: unshaded
        right:
          - state: inhand-right-shield
            shader: unshaded
    - type: PointLight
      netsync: false
      enabled: false
      radius: 1.5
      energy: 2
      color: blue
    - type: ItemTogglePointLight
    - type: AltBlocking
      rangeBlockProb: 0
      meleeBlockProb: 0
      activeRangeBlockProb: 0.50
      activeMeleeBlockProb: 0.75
    - type: ToggleBlockingChance
      toggledRangeBlockProb: 0.40
      toggledMeleeBlockProb: 0.65 #No more stunbatons
    - type: Appearance
    - type: AltArmor
      tresholdDict:
        Piercing: 55
        Blunt: 30
        Heat: 35
        Slash: 30
        Radiation: 1000
        Poison: 1000
        Asphyxiation: 1000
        Bloodloss: 1000
        Caustic: 1000
        Shock: 30
        Cold: 50
      #Blocks effectively anything station normally uses
      durabilityTresholdDict:
        Piercing: 40
        Blunt: 40
        Heat: 40
        Slash: 40
        Radiation: 1000
        Poison: 1000
        Asphyxiation: 1000
        Bloodloss: 1000
        Caustic: 1000
        Shock: 40
        Cold: 70
      #Immune to everything except .60
    - type: Damageable
      damageContainer: Shield
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 100
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
        - trigger:
            !type:DamageTrigger
            damage: 100
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: GlassBreak
            - !type:SpawnEntitiesBehavior
              spawn:
                BrokenEnergyShield:
                  min: 1
                  max: 1
    - type: StaticPrice
      price: 350

