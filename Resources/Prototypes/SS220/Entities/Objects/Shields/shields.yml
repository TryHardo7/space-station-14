- type: entity
  name: base shield
  parent: BaseItem
  id: BaseShieldAlt
  description: A shield!
  abstract: true
  components:
    - type: ExaminableDamage
      messages: ShieldMessages
    - type: Sprite
      sprite: Objects/Weapons/Melee/shields.rsi
      state: riot-icon
    - type: Item
      sprite: Objects/Weapons/Melee/shields.rsi
      size: Ginormous
      heldPrefix: riot
    - type: AltBlocking
    - type: InstastunResist
      resistedStunTypes:
      - Creampie
      active: false
    - type: InstastunResistOnActiveBlocking
    - type: ArmorBlock
    - type: AltArmor
      tresholdDict:
          Radiation: 1000
          Poison: 1000
          Asphyxiation: 1000
          Bloodloss: 1000
          Caustic: 1000
          Shock: 30
      durabilityTresholdDict:
          Radiation: 1000
          Poison: 1000
          Asphyxiation: 1000
          Bloodloss: 1000
          Caustic: 1000
          Shock: 40
      #Those damage types cannot be dealt to the shield and, logically, to the user
    - type: Damageable
      damageContainer: Shield
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 140
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
        - trigger:
            !type:DamageTrigger
            damage: 100 #This is probably enough damage before it breaks
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak
            - !type:SpawnEntitiesBehavior
              spawn:
                SheetSteel:
                  min: 2
                  max: 2
                SheetGlass:
                  min: 2
                  max: 2
    - type: StaticPrice
      price: 100

