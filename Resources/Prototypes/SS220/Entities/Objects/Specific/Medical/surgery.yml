- type: entity
  parent: BaseToolSurgery
  id: SurgeryDrapes
  name: surgery drapes
  description: drapes which used in surgery
  components:
  - type: Sprite
    sprite: SS220/Objects/Specific/Medical/surgery_tools.rsi
    state: drape
  - type: StaticPrice
    price: 20
  - type: Tag
    tags:
    - SurgeryTool
  - type: SurgeryStarter
  - type: ActivatableUI
    key: enum.SurgeryDrapeUiKey.Key
  - type: UserInterface
    interfaces:
      enum.SurgeryDrapeUiKey.Key:
        type: SurgeryDrapeBUI
  - type: GuideHelp
    guides:
    - Surgery


