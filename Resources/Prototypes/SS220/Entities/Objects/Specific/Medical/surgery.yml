- type: entity
  name: compact direct defibrillator
  description: small and low power hand-held defibrillator for direct heart apply only
  parent: BaseItem
  id: DirectHandHeldDefibrillator
  components:
  - type: Sprite
    sprite: SS220/Objects/Specific/Medical/surgery_tools.rsi
    state: direct-defibrillator
  - type: Item
    size: Small
    storedRotation: 90
  - type: DirectCompactDefibrillator
  - type: UseDelay
  - type: Defibrillator
    zapHeal:
      types:
        Asphyxiation: -40
  - type: GuideHelp
    guides:
    - Surgery

- type: entity
  name: implant scanner
  description: Advanced scanner which can find poorly hidden uncommon objects in person body
  parent: BaseItem
  id: HandHeldImplantMedicalScanner
  components:
  - type: Sprite
    sprite: SS220/Objects/Specific/Medical/surgery_tools.rsi
    state: implant-scanner
  - type: Item
    size: Small
    storedRotation: 90
  - type: ImplantCheckInSurgery
  - type: GuideHelp
    guides:
    - Surgery

- type: entity
  name: implant scanner report
  description: Better than get playing russian roulette with implanter
  parent: Paper
  id: ImplantCheckReportPaper
  components:
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    layers:
    - state: paper_receipt_horizontal
    - state: paper_receipt_horizontal_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: PaperVisuals
    backgroundImagePath: "/Textures/Interface/Paper/paper_background_perforated.svg.96dpi.png"
    headerImagePath: "/Textures/Interface/Paper/paper_heading_forensic_scanner.svg.96dpi.png"
    headerMargin: 0.0, 0.0, 0.0, 4.0
    backgroundImageTile: true
    backgroundPatchMargin: 6.0, 0.0, 6.0, 0.0
    contentMargin: 12.0, 0.0, 6.0, 0.0
    maxWritableArea: 368.0, 256.0

- type: entity
  parent: BaseItem
  id: MindslaveFixerCerebralImplant
  name : cerebral implant
  description: weird implant, why it even exists...
  components:
  - type: Sprite
    sprite: SS220/Interface/Actions/implants.rsi
    state: mindslave_fixer
  - type: MindSlaveDisfunctionFixer
  - type: SurgeryTool
    toolType: Specific
    failureDamage:
      types:
        Cerebral: 5
  - type: HiddenDescription
    entries:
      MedicalKnowledge: [ hidden-desc-implant-manipulator-medical ]
      SyndicateAgentKnowledge: [ hidden-desc-implant-mindslave-fixer-manipulator-syndicate ]
      ScienceKnowledge: [ hidden-desc-implant-manipulator-research ]
    nameEntries:
    - [MedicalKnowledge, null]
    - [SyndicateAgentKnowledge, null]
    - [ScienceKnowledge, null]
    hiddenName: ent-MindslaveFixerCerebralImplant
  - type: GuideHelp
    guides:
    - Surgery
