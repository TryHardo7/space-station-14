- type: entity
  parent: [BaseStructureDynamic, BaseFoldable]
  id: TableFolding
  name: folding table
  description: Great for a picnic!
  components:
  - type: Rotatable
  - type: Sprite
    sprite: SS220/Structures/Furniture/folding_table.rsi
    layers:
    - state: folding
      map: ["unfoldedLayer"]
    - state: folding_folded
      map: ["foldedLayer"]
      visible: false
  - type: Item
    size: Huge
  - type: Appearance
  - type: PlaceableSurface
  - type: Construction
    graph: TableFoldingGraph
    node: TableFoldingNode
  - type: DeployFoldable
  - type: DamageExaminable
  - type: Bonkable
    bonkDamage:
      types:
        Blunt: 4
  - type: Physics
    bodyType: Dynamic
  - type: Climbable
  - type: Pullable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 100
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 8
    soundHit:
      collection: MetalThud
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetPlastic1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]


- type: entity
  parent: TableFolding
  id: TableFoldingSpawnFolded
  suffix: folded
  components:
  - type: Foldable
    folded: true

