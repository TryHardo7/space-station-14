# Cargo virus kit: a crate with one RNA (cold) and one DNA (quvot) sample vial. The virus rides on the
# vial's solution as reagent data, stamped at map init by VirusSampleSystem (can't be authored in YAML).

- type: entity
  parent: ChemistryEmptyVial
  id: ColdVirusSample
  suffix: Cold
  components:
  - type: Label
    currentLabel: virus-cold-name
  - type: VirusSample
    virus: Cold
  - type: Tag
    tags:
    - CentrifugeCompatible

- type: entity
  parent: ChemistryEmptyVial
  id: QuvotVirusSample
  suffix: Quvot
  components:
  - type: Label
    currentLabel: virus-quvot-name
  - type: VirusSample
    virus: Quvot
  - type: Tag
    tags:
    - CentrifugeCompatible

- type: entity
  parent: CrateMedical
  id: CrateVirusSamples
  name: virus sample crate
  description: A pair of sealed virus strain samples, one RNA and one DNA.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ColdVirusSample
        - id: QuvotVirusSample

- type: cargoProduct
  id: VirusSampleKit
  icon:
    sprite: Objects/Specific/Chemistry/vial.rsi
    state: vial
  product: CrateVirusSamples
  cost: 5000
  category: cargoproduct-category-name-medical
  group: market
