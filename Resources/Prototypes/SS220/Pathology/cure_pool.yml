# The fixed pools a virus cure (one natural + one synthesized reagent) and per-symptom accelerants are
# rolled from. Keep `accelerants` disjoint from `natural`/`synthesized` — an accelerant must not cure.
- type: diseaseCurePool
  id: Default
  natural:
  - EZNutrient
  - Cream
  - Omnizine
  synthesized:
  - Tricordrazine
  - Bruizine
  - Dylovene
  accelerants:
  - HeartbreakerToxin
  - Aloe
  - Plasma
