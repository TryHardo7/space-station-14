# Terminal "burning blood" ability: hurl a fireball at a clicked tile on a cooldown, catching fire yourself.
# Granted by the burning-blood symptom's terminal stage via FireBreathingComponent.
- type: entity
  parent: BaseAction
  id: ActionVirusFireBreathing
  name: огнедыхание
  description: Метнуть огненный шар в указанную точку. Сжигает цель — но и сам носитель вспыхивает.
  components:
  - type: Action
    useDelay: 20
    itemIconStyle: BigAction
    icon:
      sprite: SS220/Interface/Actions/magic_spells.rsi
      state: fireball
  - type: TargetAction
    checkCanAccess: false
    range: 20
  - type: WorldTargetAction
    event: !type:FireBreathingActionEvent

# A lighter fireball than the wizard's: heat damage + sets the target alight + a small ~3-tile blast on
# impact that doesn't break tiles (BulletRocket already triggers the explosion on collision).
- type: entity
  parent: BulletRocket
  id: ProjectileVirusFireball
  name: огненный шар
  categories: [ HideSpawnMenu ]
  components:
  - type: PointLight
    color: "#E25822"
    radius: 2.0
    energy: 5.0
  - type: Projectile
    damage:
      types:
        Heat: 8
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: fireball
      shader: unshaded
  # totalIntensity = slope * (pi/3) * radius^3 ~= 55 for radius ~3 tiles (uncapped: slope*radius < maxIntensity)
  - type: Explosive
    explosionType: Default
    totalIntensity: 55
    intensitySlope: 2
    maxIntensity: 8
    maxTileBreak: 0
  - type: IgnitionSource
    temperature: 400
    ignited: true
  - type: IgniteOnCollide
    fireStacks: 2
