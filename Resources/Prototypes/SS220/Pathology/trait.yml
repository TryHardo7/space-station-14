- type: pathology
  id: Blindness
  name: pathology-blindness-name
  definition:
  - description: pathology-start-blindness-description
    progressMessage: pathology-start-blindness-popup
    progressConditions:
    - !type:PathologyTimeProgressCondition
      delay: 3m
  - description: pathology-full-blindness-description
    components:
    - type: PermanentBlindness

- type: pathology
  id: Muted
  name: pathology-muted-name
  definition:
  - description: pathology-start-muted-description
    progressMessage: pathology-start-muted-popup
    progressConditions:
    - !type:PathologyTimeProgressCondition
      delay: 3m
  - description: pathology-muted-description
    components:
    - type: Muted

- type: pathology
  id: Narcolepsy
  name: pathology-narcolepsy-name
  definition:
  - description: pathology-start-narcolepsy-description
    progressMessage: pathology-start-narcolepsy-popup
    progressConditions:
    - !type:PathologyTimeProgressCondition
      delay: 3m
  - description: pathology-narcolepsy-description
    components:
    - type: Narcolepsy
      maxTimeBetweenIncidents: 600
      minTimeBetweenIncidents: 300
      maxDurationOfIncident: 30
      minDurationOfIncident: 10

- type: pathology
  id: Slowness
  name: pathology-slowness-name
  definition:
  - description: pathology-slowness-description
    detection:
      description: pathology-slowness-detection
    components:
    - type: ChangeSpeedDoAfters
      coefficient: 1.3

- type: pathology
  id: Nervousness
  name: pathology-nervousness-name
  definition:
  - description: pathology-nervousness-description
    components:
    - type: ChangeSpeedDoAfters
      coefficient: 0.7
      chanceToFail: 0.27

- type: pathology
  id: PoorVision
  name: pathology-poor-vision-name
  definition:
  - description: pathology-poor-vision-description
    components:
    - type: PermanentBlindness
      blindness: 4

- type: pathology
  id: LightweightDrunk
  name: pathology-lightweight-drunk-name
  definition:
  - description: pathology-lightweight-drunk-description
    components:
    - type: LightweightDrunk
      boozeStrengthMultiplier: 2

- type: pathology
  id: Paracusia
  name: pathology-paracusia-name
  genome: Rna
  definition:
  - description: pathology-paracusia-description
    components:
    - type: Paracusia
      minTimeBetweenIncidents: 0.1
      maxTimeBetweenIncidents: 300
      maxSoundDistance: 7
      sounds:
        collection: Paracusia

- type: pathology
  id: PainNumbness
  name: pathology-pain-numbness-name
  definition:
  - description: pathology-pain-numbness-description
    statusEffects:
    - TraitStatusEffectPainNumbness

- type: pathology
  id: FrontalLisp
  name: pathology-frontal-lisp-name
  definition:
  - description: pathology-frontal-lisp-description
    components:
    - type: FrontalLisp
