#  How to crate ur own favorite virus?
#  A virus is spread method + a list of symptoms.
#  Btw cure & accelerant reagents are rolled automatically
#
# Create virus proto in this file.
#  - type: virus
#    id: MyFavVirus
#    name: virus-myfavvirus-name   # do not forget locale, en+ru
#    transmission:                 
#      contactChance: 0.5          
#      proximityChance: 0.1        # per second 
#      proximityRange: 2           
#    symptoms:                     # all must share one genome, RNA or DNA, will break if u mix them
#    - Sneezing
#    - Necrosis
# At this point virus is set, do not forget to add guidebook entry known_viruses.xml
# But if u want more - new symptoms etc. - this is where it gets tricky:
#  
#
# todo: write comprehend instruction about pathogenes

