- type: constructionGraph
  id: FlowerHedgeGraph
  start: start
  graph:
    - node: start
      edges:
        - to: FlowerHedge
          completed:
            - !type:SnapToGrid
              southRotation: true
          steps:
            - material: WoodPlank
              amount: 5
              doAfter: 5

    - node: FlowerHedge
      entity: FlowerHedge
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank
              amount: 3
            - !type:DeleteEntity {}
          steps:
            - tool: Prying
              doAfter: 2

