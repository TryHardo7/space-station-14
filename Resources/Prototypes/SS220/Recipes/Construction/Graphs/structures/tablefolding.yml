- type: constructionGraph
  id: TableFoldingGraph
  start: start
  graph:
    - node: start
      edges:
        - to: TableFoldingNode
          completed:
            - !type:SnapToGrid
              southRotation: true
          steps:
            - material: Plastic
              amount: 2
              doAfter: 2
            - material: MetalRod
              amount: 4
              doAfter: 2

    - node: TableFoldingNode
      entity: TableFolding
      edges:
        - to: start
          completed:
          - !type:SpawnPrototype
            prototype: SheetPlastic1
            amount: 2
          - !type:SpawnPrototype
            prototype: PartRodMetal1
            amount: 4
          - !type:DeleteEntity {}
          steps:
            - tool: Screwing
              doAfter: 3


