- type: job
  id: Virologist
  name: job-name-virologist
  description: job-description-virologist
  playTimeTracker: JobVirologist
  requirements:
  - !type:DepartmentTimeRequirement
    department: Medical
    time: 36000 # 10h
  startingGear: VirologistGear
  experienceDefinition: VirologistRoleExperience
  icon: "JobIconVirologist"
  supervisors: job-supervisors-cmo
  access:
  - Medical
  - Maintenance

- type: startingGear
  id: VirologistGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitVirology
    back: ClothingBackpackVirology
    shoes: ClothingShoesColorWhite
    outerClothing: ClothingOuterCoatLab
    id: VirologistPDA
    ears: ClothingHeadsetMedical

- type: playTimeTracker
  id: JobVirologist

- type: chameleonOutfit
  id: VirologistChameleonOutfit
  job: Virologist
  equipment:
    head: ClothingHeadHatBeretMedic
    mask: ClothingMaskSterile
    jumpsuit: ClothingUniformJumpsuitVirology
    outerClothing: ClothingOuterCoatLab
    gloves: ClothingHandsGlovesLatex
    shoes: ClothingShoesColorWhite

- type: entity
  parent: MedicalIDCard
  id: VirologistIDCard
  name: virologist ID card
  components:
  - type: Sprite
    layers:
    - state: default
    - state: idvirologist
  - type: PresetIdCard
    job: Virologist
  - type: Tag
    tags:
    - WhitelistPdaIdPainter

- type: entity
  parent: BaseMedicalPDA
  id: VirologistPDA
  name: virology PDA
  description: Smells faintly of bleach and quarantine tape.
  components:
  - type: Pda
    id: VirologistIDCard
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda-virology
  - type: PdaBorderColor
    borderColor: "#cbcdd1"
    accentHColor: "#4977a6"
    accentVColor: "#bf5319"
  - type: Sprite
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "pda"
    - state: "screen-medic"
      shader: "unshaded"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      visible: false
  - type: Icon
    state: pda-virology
  - type: Tag
    tags:
    - WhitelistPdaIdPainter
    - DoorBumpOpener
    - WhitelistChameleon
    - WhitelistChameleonPDA

- type: entity
  parent: SpawnPointJobBase
  id: SpawnPointVirologist
  name: virologist
  components:
  - type: SpawnPoint
    job_id: Virologist
  - type: Sprite
    layers:
    - state: green
    - state: virologist
